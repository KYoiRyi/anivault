name: iOS Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Fetch dependencies
        run: flutter pub get
        
      - name: Setup CocoaPods
        run: |
          cd ios
          pod install
          
      - name: Build iOS Application (No Sign)
        run: flutter build ios --release --no-codesign
        
      - name: Generate IPA archive
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -qq -r -9 AniVault.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anivault-ios-release
          path: build/ios/iphoneos/AniVault.ipa
