name: iOS Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Fetch dependencies
        run: flutter pub get
        
      - name: Setup CocoaPods
        run: |
          cd ios
          pod install
          
      - name: Build iOS Application (No Sign)
        run: |
          # Flutter must build first to hydrate dart code, fetch CocoaPods, and generate Runner.xcworkspace.
          # It might crash at the end due to Provisioning Profile requirements, so we swallow the error if any.
          flutter build ios --release --no-codesign || true
          
          # Now that the workspace exists and Pods are installed, we force xcodebuild to produce the Runner.app
          # by explicitly stripping all code signing attributes from the build environment.
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet
        
      - name: Generate IPA archive
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -qq -r -9 AniVault.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anivault-ios-release
          path: build/ios/iphoneos/AniVault.ipa
