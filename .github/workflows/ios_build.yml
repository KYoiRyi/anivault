name: iOS Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Fetch dependencies
        run: flutter pub get
        
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
          
      - name: Build anivault_core for iOS
        run: |
          cd native/anivault_core
          cargo build --target aarch64-apple-ios --release
          cd ../..

      - name: Setup CocoaPods
        run: |
          cd ios
          pod install
          
      - name: Build iOS Application (No Sign)
        run: |
          flutter build ios --release --no-codesign > flutter_build.log 2>&1 || true
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" OTHER_LDFLAGS="-force_load $(pwd)/../native/anivault_core/target/aarch64-apple-ios/release/libanivault_core.a -framework CoreML" > ../xcodebuild.log 2>&1 || true
          cd ..
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Build failed!"
            exit 1
          fi
          
      - name: Push logs on failure
        if: failure()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.log
          git commit -m "chore: upload build logs [skip ci]" || true
          git push || true
        
      - name: Generate IPA archive
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -qq -r -9 AniVault.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anivault-ios-release
          path: build/ios/iphoneos/AniVault.ipa
